name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: av_parfums_test
          POSTGRES_USER: av_parfums
          POSTGRES_PASSWORD: av_parfums
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U av_parfums"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://av_parfums:av_parfums@localhost:5432/av_parfums_test
      SECRET_KEY: ci-secret-key
      DJANGO_SETTINGS_MODULE: config.settings.test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Type-check (mypy)
        run: mypy . || true # informational until the baseline is clean
      - name: Migrations are up to date
        run: python manage.py makemigrations --check --dry-run
      - name: Tests
        run: pytest --cov --cov-fail-under=80

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (eslint + prettier)
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npm run build

  docker:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t avparfums-backend ./backend
      - name: Build frontend image
        run: docker build -t avparfums-frontend ./frontend
      # Deploy step is target-agnostic on purpose. Wire your host here, e.g.:
      #   flyctl deploy / railway up / docker push + ssh
      # Secrets (SECRET_KEY, DATABASE_URL, SENTRY_DSN, ...) come from
      # GitHub Actions repository secrets.
