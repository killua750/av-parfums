# Render Blueprint — deploys the Django API on the free plan.
# Dashboard → New → Blueprint → point it at this repo.
# The free instance spins down after ~15 min idle; first request then takes
# ~30-60 s to wake. Fine for a demo/client validation, upgrade for launch.

services:
  - type: web
    name: av-parfums-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    # seed_media restores the bundled product images onto the ephemeral disk;
    # bootstrap seeds fixtures ONLY into empty tables (admin edits survive
    # restarts) and creates the superuser from the DJANGO_SUPERUSER_* vars.
    startCommand: >
      python manage.py migrate --no-input &&
      python manage.py seed_media &&
      python manage.py bootstrap &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the dashboard
      - key: ALLOWED_HOSTS
        value: av-parfums-api.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false # https://<your-app>.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false # same as above (harmless even though the proxy makes it same-origin)
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True" # no Redis on the free tier: tasks run inline
      - key: ORDER_NOTIFICATION_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@admin.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true # reveal it: Render dashboard → av-parfums-api → Environment
